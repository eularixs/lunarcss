name: Publish Beta

# Beta releases publish from `dev`. Trigger by including `release: beta` in
# the head commit message (PR title also works when squash-merging â€” the PR
# title becomes the squash commit message).
#
# Stable releases (`release: patch|minor|major`) live in `publish.yml` and
# fire only from `main`.

on:
  push:
    branches:
      - dev

jobs:
  check-trigger:
    name: Check beta release trigger
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
    steps:
      - uses: actions/checkout@v4

      - name: Check commit message
        id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if echo "${COMMIT_MSG}" | grep -qE '^release: beta\b'; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

  publish-beta:
    name: Publish beta to npm
    needs: check-trigger
    if: needs.check-trigger.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # pnpm version is read from `packageManager` in package.json.
      # Do not pass `with.version` â€” pnpm/action-setup@v4 errors when both are set.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump prerelease version
        id: bump
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          # If the current version is already a beta (e.g. 0.2.0-beta.3), bump
          # the prerelease counter (-> 0.2.0-beta.4). Otherwise enter beta
          # mode at the next minor (-> 0.2.0-beta.0 or similar).
          if echo "${CURRENT}" | grep -qE '\-beta\.[0-9]+$'; then
            npm version prerelease --preid=beta --no-git-tag-version
          else
            npm version preminor --preid=beta --no-git-tag-version
          fi
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          git add package.json
          git commit -m "chore: release v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push origin dev --follow-tags

      - name: Publish beta to npm
        run: npm publish --tag beta --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
