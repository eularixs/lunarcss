name: Publish Beta

# Beta releases publish from `dev`. Same trigger surface as `publish.yml`:
# include `release: patch|minor|major` in the head commit message. The bump
# type chooses which level enters beta when transitioning from a stable
# version (1.2.3 → 1.2.4-beta.0 / 1.3.0-beta.0 / 2.0.0-beta.0). When the
# current version is already a beta (X.Y.Z-beta.N), the type is ignored and
# the prerelease counter increments (X.Y.Z-beta.N+1).
#
# Stable releases on `main` are handled by `publish.yml` with the same
# `release: patch|minor|major` directive.

on:
  push:
    branches:
      - dev

jobs:
  check-trigger:
    name: Check release trigger
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      bump_type: ${{ steps.check.outputs.bump_type }}
    steps:
      - uses: actions/checkout@v4

      - name: Check commit message
        id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Match `release: (patch|minor|major)` either at the start of the
          # commit message or after a separator (newline / space / comma).
          # Case-insensitive so `Release: minor`, `RELEASE: PATCH`, etc.
          # also trigger. Lowercases the captured bump type before use.
          if printf '%s' "${COMMIT_MSG}" | grep -qiE '(^|[[:space:],])release: (patch|minor|major)\b'; then
            BUMP=$(printf '%s' "${COMMIT_MSG}" | grep -oiE 'release: (patch|minor|major)' | head -n1 | awk '{print tolower($2)}')
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "bump_type=${BUMP}" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "bump_type=" >> "$GITHUB_OUTPUT"
          fi

  publish-beta:
    name: Publish beta to npm
    needs: check-trigger
    if: needs.check-trigger.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # pnpm version is read from `packageManager` in package.json.
      # Do not pass `with.version` — pnpm/action-setup@v4 errors when both are set.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump beta version
        id: bump
        env:
          BUMP_TYPE: ${{ needs.check-trigger.outputs.bump_type }}
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          if echo "${CURRENT}" | grep -qE '\-beta\.[0-9]+$'; then
            # Already in beta — type is ignored; just bump the counter.
            npm version prerelease --preid=beta --no-git-tag-version
          else
            # Entering beta from a stable version. Map type → pre<type>.
            case "${BUMP_TYPE}" in
              patch) npm version prepatch --preid=beta --no-git-tag-version ;;
              minor) npm version preminor --preid=beta --no-git-tag-version ;;
              major) npm version premajor --preid=beta --no-git-tag-version ;;
              *) echo "Unknown BUMP_TYPE='${BUMP_TYPE}'"; exit 1 ;;
            esac
          fi
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          git add package.json
          git commit -m "chore: release ${NEW_VERSION}"
          # Tag name matches the npm version exactly (no `v` prefix). Aligns
          # `git ls-remote --tags` output with `npm view @lunar-kit/css versions`.
          git tag "${NEW_VERSION}"
          git push origin dev --follow-tags
          echo "::notice title=Tag pushed::${NEW_VERSION} pushed to origin/dev"

      - name: Publish beta to npm
        run: npm publish --tag beta --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Create a GitHub Release marked `prerelease: true`. Beta releases stay
      # out of the "Latest release" pin on the repo home page; users opting in
      # see them under the All Releases tab.
      - name: Create GitHub Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.new_version }}
          name: ${{ steps.bump.outputs.new_version }}
          generate_release_notes: true
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
