name: Publish

on:
  push:
    branches:
      - main

jobs:
  check-trigger:
    name: Check release trigger
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      bump_type: ${{ steps.check.outputs.bump_type }}
    steps:
      - uses: actions/checkout@v4

      - name: Check commit message
        id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if echo "${COMMIT_MSG}" | grep -qE '^release: (patch|minor|major)'; then
            BUMP=$(echo "${COMMIT_MSG}" | grep -oE '(patch|minor|major)')
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "bump_type=${BUMP}" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "bump_type=" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish to npm
    needs: check-trigger
    if: needs.check-trigger.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # pnpm version is read from `packageManager` in package.json.
      # Do not pass `with.version` — pnpm/action-setup@v4 errors when both are set.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        env:
          BUMP_TYPE: ${{ needs.check-trigger.outputs.bump_type }}
        run: |
          npm version "${BUMP_TYPE}" --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          git add package.json
          git commit -m "chore: release v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push origin main --follow-tags

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
