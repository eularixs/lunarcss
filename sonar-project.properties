sonar.projectKey=lunarcss
sonar.projectName=LunarCSS
sonar.organization=eularix
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,src/__tests__/**/*.ts
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.exclusions=src/__theme__.ts,dist/**,example/**,docs/**,**/node_modules/**,**/.lunarcss/**,coverage/**
sonar.coverage.exclusions=src/__tests__/**,src/__theme__.ts,example/**,docs/**
sonar.cpd.exclusions=example/**,docs/**
